<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boy Valentyas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: monospace; display: flex; justify-content: center; padding: 3rem 1rem; min-height: 100vh; position: relative; overflow-x: hidden; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .wrap { max-width: 420px; width: 100%; position: relative; z-index: 2; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #1D9E75; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 28px; color: #1D9E75; overflow: hidden; background: #111; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    h1 { text-align: center; color: #e0e0e0; font-size: 18px; margin-bottom: 4px; }
    .cursor { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .bio { text-align: center; color: #1D9E75; font-size: 13px; margin-bottom: 4px; }
    .status { text-align: center; color: #555; font-size: 12px; margin-bottom: 2rem; }
    .status::before { content: "[ "; } .status::after { content: " ]"; }
    a { display: block; width: 100%; padding: 13px 16px; margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid #1D9E75; border-radius: 8px; color: #5DCAA5; font-family: monospace; font-size: 14px; text-decoration: none; }
    a:hover { background: rgba(29,158,117,0.12); }
    .prefix { color: #0F6E56; margin-right: 8px; }
    .arrow { float: right; color: #0F6E56; }
    hr { border: none; border-top: 1px solid #222; margin: 1.5rem 0; }
    .footer { text-align: center; color: #333; font-size: 11px; }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="wrap">
    <div class="avatar">
      <img src="https://github.com/boyvalentyas-stack.png" alt="avatar" />
    </div>
    <h1>Boy Valentyas Indra G.<span class="cursor">_</span></h1>
    <p class="bio">> Quality Assurance Engineer</p>
    <p class="status">available for work</p>

    <a href="https://github.com/boyvalentyas-stack/" target="_blank" rel="noopener noreferrer">
      <span class="prefix">01.</span> GitHub <span class="arrow">-></span>
    </a>
    <a href="https://www.linkedin.com/in/boy-valentyas-indra-gunara-86a9ba181/" target="_blank" rel="noopener noreferrer">
      <span class="prefix">03.</span> LinkedIn <span class="arrow">-></span>
    </a>
    <a href="https://www.instagram.com/aceblanc.toujo/" target="_blank" rel="noopener noreferrer">
      <span class="prefix">04.</span> Instagram <span class="arrow">-></span>
    </a>
    <a href="mailto:dev.boyvalentyas@email.com" target="_blank" rel="noopener noreferrer">
      <span class="prefix">05.</span> Email me <span class="arrow">-></span>
    </a>

    <hr>
    <p class="footer">// built with html & hosted on github pages powered by Claude.AI</p>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    const chars = '01アイウエオカキクケコサシスセソタチツテト';
    const cols = () => Math.floor(canvas.width / 16);
    let drops = Array(cols()).fill(1);
    window.addEventListener('resize', () => { drops = Array(cols()).fill(1); });
    function draw() {
      ctx.fillStyle = 'rgba(13,13,13,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '13px monospace';
      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillStyle = i % 5 === 0 ? '#5DCAA5' : '#0F6E56';
        ctx.fillText(char, i * 16, y * 16);
        if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
    }
    setInterval(draw, 50);
  </script>
</body>
</html>
