<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: monospace; display: flex; justify-content: center; padding: 3rem 1rem; }
    .wrap { max-width: 420px; width: 100%; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #111; border: 2px solid #1D9E75; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 28px; color: #1D9E75; }
    h1 { text-align: center; color: #e0e0e0; font-size: 18px; margin-bottom: 4px; }
    .bio { text-align: center; color: #1D9E75; font-size: 13px; margin-bottom: 4px; }
    .status { text-align: center; color: #555; font-size: 12px; margin-bottom: 2rem; }
    .status::before { content: "[ "; } .status::after { content: " ]"; }
    a { display: block; width: 100%; padding: 13px 16px; margin-bottom: 10px; background: transparent; border: 1px solid #1D9E75; border-radius: 8px; color: #5DCAA5; font-family: monospace; font-size: 14px; text-decoration: none; }
    a:hover { background: rgba(29,158,117,0.08); }
    .prefix { color: #0F6E56; margin-right: 8px; }
    .arrow { float: right; color: #0F6E56; }
    hr { border: none; border-top: 1px solid #222; margin: 1.5rem 0; }
    .footer { text-align: center; color: #333; font-size: 11px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="avatar">YN</div>           <!-- Change YN to your initials -->
    <h1>your_name</h1>                     <!-- Your name -->
    <p class="bio">> your bio here</p>     <!-- Short description -->
    <p class="status">available for work</p>

    <a href="https://github.com/yourusername">
      <span class="prefix">01.</span> GitHub <span class="arrow">-></span>
    </a>
    <a href="https://yourportfolio.com">
      <span class="prefix">02.</span> Portfolio <span class="arrow">-></span>
    </a>
    <a href="https://linkedin.com/in/yourprofile">
      <span class="prefix">03.</span> LinkedIn <span class="arrow">-></span>
    </a>
    <a href="https://twitter.com/yourhandle">
      <span class="prefix">04.</span> Twitter / X <span class="arrow">-></span>
    </a>
    <a href="mailto:your@email.com">
      <span class="prefix">05.</span> Email me <span class="arrow">-></span>
    </a>

    <hr>
    <p class="footer">// built with html & hosted on github pages</p>
  </div>
</body>
</html>
